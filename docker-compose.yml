version: "3.9"

services:
  db:
    image: postgres:16
    container_name: redisboost_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: redisboost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis/redis-stack-server:latest
    container_name: redisboost_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: